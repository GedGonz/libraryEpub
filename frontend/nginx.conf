server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy al backend Spring Boot
    # Importante: proxy_pass sin parte de URI para no duplicar /api
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy a las portadas servidas por el backend
    location /covers/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # Portadas con nombre por sha256 => se pueden cachear fuerte
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    # SPA fallback: cualquier ruta no encontrada vuelve a index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}

